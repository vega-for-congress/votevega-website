name = "votevega-form-submission"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Environment variables and secrets
# Run: wrangler secret put TURNSTILE_SECRET_KEY
# Run: wrangler secret put TURNSTILE_TEST_SECRET_KEY
# Run: wrangler secret put RESEND_API_KEY

[vars]
ALLOWED_ORIGINS = "https://votevega.nyc,https://www.votevega.nyc,https://secure.votevega.nyc,https://donation-widget-dev.up.railway.app,http://localhost:8080,http://localhost:3000,https://*--votevega.netlify.app"
VEGAVAN_API_URL = "https://van.votevega.nyc"
SIGNUP_NOTIFICATION_EMAILS = "jose@votevega.nyc,adrian@votevega.nyc,press@votevega.nyc"

[observability]
enabled = true

[observability.logs]
invocation_logs = true
